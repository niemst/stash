name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  # Job 1: Build Binaries for all platforms
  # We use ubuntu-latest for everything because Go cross-compilation is excellent.
  # This avoids shell compatibility issues (e.g., bash vs powershell).
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, label: linux-x86_64 }
          - { goos: linux, goarch: arm64, label: linux-arm64 }
          - { goos: darwin, goarch: amd64, label: macos-x86_64 }
          - { goos: darwin, goarch: arm64, label: macos-arm64 }
          - { goos: windows, goarch: amd64, label: windows-x86_64 }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        shell: bash
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o stash-${{ matrix.label }}$EXT ./cmd/cli/

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          files: stash-${{ matrix.label }}*

  # Job 2: Build and Push Multi-Arch Docker Image
  build-docker:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
