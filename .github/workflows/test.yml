name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: stash_test
          POSTGRES_USER: stash
          POSTGRES_PASSWORD: stash
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run Unit Tests
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Check Code Format
        run: |
          test -z $(go fmt ./...)

      - name: Run Go Vet
        run: |
          go vet ./...

      - name: Build Binary
        run: |
          go build -o /tmp/stash ./cmd/cli/

      - name: Verify Build
        run: |
          /tmp/stash --help
