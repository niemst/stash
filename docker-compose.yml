version: '3.8'

services:
  # Database
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: stash
      POSTGRES_USER: stash
      POSTGRES_PASSWORD: stash_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stash"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Stash MCP server + background consolidation
  stash:
    build: .
    command: ["mcp", "serve", "--host", "0.0.0.0", "--port", "18080", "--with-consolidation"]
    ports:
      - "18080:18080"
    # host.docker.internal is a Docker Desktop name; under Dory the engine runs
    # in a VM, so host-gateway points at the VM, not macOS. The macOS host is
    # the vmnet gateway (192.168.64.1). Override via DORY_HOST_IP if it changes.
    extra_hosts:
      - "host.docker.internal:${DORY_HOST_IP:-192.168.64.1}"
    environment:
      # Required
      STASH_POSTGRES_DSN: postgresql://stash:stash_dev_password@postgres:5432/stash?sslmode=disable
      STASH_VECTOR_DIM: ${STASH_VECTOR_DIM:-1024}
      STASH_MAX_RESULT_SIZE: 10000
      STASH_OPENAI_API_KEY: ${STASH_OPENAI_API_KEY}
      STASH_OPENAI_BASE_URL: ${STASH_OPENAI_BASE_URL}
      STASH_EMBEDDING_MODEL: ${STASH_EMBEDDING_MODEL}
      STASH_REASONER_MODEL: ${STASH_REASONER_MODEL}
      STASH_CONTEXT_TTL: 1h
      STASH_HTTP_ADDR: :18080
      STASH_LOG_LEVEL: info
      STASH_LOG_FORMAT: text
      # Optional consolidation configs
      STASH_CONSOLIDATION_BATCH_SIZE: 100
      STASH_CONSOLIDATION_SIMILARITY_THRESHOLD: 0.85
      STASH_CONSOLIDATION_DEDUP_THRESHOLD: 0.95
      STASH_CONSOLIDATION_WINDOW: 168h
      STASH_DECAY_FACTOR: 0.95
      STASH_EXPIRY_THRESHOLD: 0.1
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/stash", "env"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data: